<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartWeb Store | Smriti Sharma</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>SmartWeb Store</h1>
        <div class="cart-status">
            🛒 Items: <span id="cart-count">0</span>
        </div>
    </header>

    <div class="container">
        <h2>Featured Products</h2>
        <main id="product-list">
            </main>

        <section id="cart-section">
            <h2>Your Shopping Cart</h2>
            <ul id="cart-items">
                </ul>
            <div class="total-section">
                <strong>Total: ₹<span id="total-price">0</span></strong>
                <br><br>
                <button onclick="checkout()" class="btn-checkout">Proceed to Checkout</button>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
